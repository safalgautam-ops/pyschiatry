services:
  mysql:
    image: mysql:8
    container_name: mysql-local
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: authentication_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
      # Executed only on first initialization (empty mysql_data volume).
      - ./drizzle/migrations/0000_magenta_terrax.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
      - ./docker/mysql/init/01-seed-doctors.sql:/docker-entrypoint-initdb.d/01-seed-doctors.sql:ro

volumes:
  mysql_data:
